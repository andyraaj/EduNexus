version: '3.8'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    container_name: EduNexus_mongo
    environment:
      MONGO_INITDB_DATABASE: EduNexus
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - EduNexus_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: EduNexus_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    networks:
      - EduNexus_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: EduNexus_api
    depends_on:
      - mongo
      - redis
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/EduNexus
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-240}
    networks:
      - EduNexus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongo_data:
    driver: local

networks:
  EduNexus_network:
    driver: bridge
