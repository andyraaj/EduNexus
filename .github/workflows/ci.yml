name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: npm install

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build client
        working-directory: client
        run: npm run build
