<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Faculty Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- SIDEBAR will be injected or same structure -->
    <aside class="sidebar">
        <div class="brand"><span>🎓</span> <span class="brand-text">EduNexus</span></div>
        <div class="user-profile">
            <div class="user-avatar user-avatar-display">F</div>
            <div class="user-info">
                <span class="user-name user-name-display">Faculty Name</span>
                <span class="user-role user-role-display">Faculty</span>
            </div>
        </div>
        <ul class="nav-links">
            <li class="nav-group-title">Main</li>
            <li class="nav-item"><a href="faculty-dashboard.html" class="nav-link"><span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span></a></li>
            <li class="nav-group-title">Management</li>
            <li class="nav-item"><a href="faculty-attendance.html" class="nav-link active"><span
                        class="nav-icon">✅</span> <span class="nav-text">Attendance</span></a></li>
            <li class="nav-item"><a href="faculty-results.html" class="nav-link"><span class="nav-icon">📝</span> <span
                        class="nav-text">Grading</span></a></li>
            <li class="nav-item"><a href="faculty-quizzes.html" class="nav-link"><span class="nav-icon">✍️</span> <span
                        class="nav-text">Quizzes</span></a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <button id="sidebarToggle" class="toggle-btn">☰</button>
            <div class="page-title">Mark Attendance</div>
            <div class="header-actions">
                <button onclick="logout()" class="btn-primary" style="background-color: var(--danger);">Logout</button>
            </div>
        </header>

        <div class="container">
            <div class="card">
                <h3>Select Class Details</h3>
                <div class="filters-container" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                    <input type="date" id="att-date" class="form-control">
                    <select id="att-subject" class="form-control">
                        <option value="">Select Subject</option>
                        <!-- Dynamic Subjects -->
                    </select>
                    <button class="btn-primary" onclick="loadStudentListForAttendance()">Load Students</button>
                </div>
            </div>

            <div class="card" id="student-list-container" style="display: none;">
                <h3>Student List</h3>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Name</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-list-body">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
                <button class="btn-primary" onclick="submitBulkAttendance()" style="margin-top: 1rem;">Submit
                    Attendance</button>
            </div>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>

</html>
