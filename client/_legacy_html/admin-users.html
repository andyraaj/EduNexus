<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <aside class="sidebar">
        <div class="brand"><span>🎓</span> <span class="brand-text">EduNexus</span></div>
        <div class="user-profile">
            <div class="user-avatar user-avatar-display" style="background-color: var(--danger);">A</div>
            <div class="user-info">
                <span class="user-name user-name-display">Admin User</span>
                <span class="user-role user-role-display">Administrator</span>
            </div>
        </div>
        <ul class="nav-links">
            <li class="nav-group-title">Overview</li>
            <li class="nav-item"><a href="admin-dashboard.html" class="nav-link"><span class="nav-icon">📊</span> <span
                        class="nav-text">Dashboard</span></a></li>
            <li class="nav-group-title">User Management</li>
            <li class="nav-item"><a href="admin-users.html" class="nav-link active"><span class="nav-icon">👥</span>
                    <span class="nav-text">All Users</span></a></li>
            <li class="nav-group-title">Administration</li>
            <li class="nav-item"><a href="#" class="nav-link"><span class="nav-icon">💰</span> <span
                        class="nav-text">Finance</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link"><span class="nav-icon">⚙️</span> <span
                        class="nav-text">Settings</span></a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <button id="sidebarToggle" class="toggle-btn">☰</button>
            <div class="page-title">User Management</div>
            <div class="header-actions">
                <button onclick="logout()" class="btn-primary" style="background-color: var(--danger);">Logout</button>
            </div>
        </header>

        <div class="container">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>All Registered Users</h3>
                    <div style="display: flex; gap: 0.5rem;">
                        <select id="role-filter" class="form-control" onchange="loadAllUsers()">
                            <option value="">All Roles</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="admin">Admin</option>
                        </select>
                        <button class="btn-primary" onclick="loadAllUsers()">Refresh</button>
                        <button class="btn-primary" onclick="document.getElementById('add-user-modal').style.display='flex'" style="background-color:var(--success)">+ Add User</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Joined</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="users-list-body">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="js/script.js"></script>

    <!-- Add User Modal -->
    <div id="add-user-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center">
        <div class="card" style="width:min(480px,90vw);margin:0;position:relative">
            <button onclick="document.getElementById('add-user-modal').style.display='none'" style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-muted)">✕</button>
            <h3 style="margin-bottom:1.5rem">Add New User</h3>
            <form id="add-user-form" onsubmit="addUser(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="new-user-name" class="form-control" required placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="new-user-email" class="form-control" required placeholder="user@EduNexus.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="new-user-password" class="form-control" required placeholder="Minimum 6 characters" minlength="6">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="new-user-role" class="form-control" required>
                        <option value="">-- Select Role --</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div style="display:flex;gap:1rem;margin-top:1.5rem">
                    <button type="submit" class="btn-primary" style="flex:1">Create User</button>
                    <button type="button" onclick="document.getElementById('add-user-modal').style.display='none'" class="btn-primary" style="flex:1;background-color:var(--text-muted)">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
